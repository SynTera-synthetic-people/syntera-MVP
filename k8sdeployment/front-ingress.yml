apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: syntera-front-mvp-ingress
  namespace: syntera-mvp
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
spec:
  rules:
    - host: staging-ui.synthetic.people.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: synth-frontend-svc
                port:
                  number: 80



# API Configuration
VITE_API_BASE_URL=https://staging-api.synthetic-people.ai
VITE_API_TIMEOUT=30000

# Backend Base URL (without /api)
 VITE_BACKEND_URL=https://staging-api.synthetic-people.ai
# VITE_BACKEND_URL=http://localhost:8000


# Environment
VITE_ENV=Staging

# Feature Flags
VITE_ENABLE_DEBUG=true
