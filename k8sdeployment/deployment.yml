apiVersion: apps/v1
kind: Deployment
metadata:
  name: synth-backend
  namespace: syntera-mvp
  labels:
    app: synth-backend
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: synth-backend
  template:
    metadata:
      labels:
        app: synth-backend
    spec:
      serviceAccountName: ssm-reader
      containers:
        - name: backend
          image: 175337843263.dkr.ecr.ap-south-1.amazonaws.com/synth-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          args:
            - uvicorn
            - app.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --proxy-headers
            - --forwarded-allow-ips=*
          env:
            - name: AWS_REGION
              value: ap-south-1
            - name: SSM_PATH
              value: "/app/staging/"
            - name: CORS_ORIGINS
              value: "https://staging-ui.synthetic-people.ai"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            timeoutSeconds: 3
            periodSeconds: 20
            failureThreshold: 5

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
