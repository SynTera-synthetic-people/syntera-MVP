apiVersion: apps/v1
kind: Deployment
metadata:
  name: synth-backend
  namespace: syntera-mvp
  labels:
    app: synth-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: synth-backend
  template:
    metadata:
      labels:
        app: synth-backend
    spec:
      serviceAccountName: ssm-reader
      containers:
        - name: backend
          image: 175337843263.dkr.ecr.ap-south-1.amazonaws.com/synth-backend:v4
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          #  IMPORTANT: make FastAPI respect ALB https headers
          args:
            - uvicorn
            - app.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --proxy-headers
            - --forwarded-allow-ips=*

          env:
            - name: AWS_REGION
              value: ap-south-1
            - name: SSM_PATH
              value: "/app/staging/"
            - name: CORS_ORIGINS
              value: "https://staging-ui.synthetic-people.ai"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
