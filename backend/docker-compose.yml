version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: syntera_postgres
    environment:
      POSTGRES_USER: synth_user
      POSTGRES_PASSWORD: synth_pass
      POSTGRES_DB: synthdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: