name: Deploy Frontend & Backend to EKS (syntera-mvp)

on:
  push:
    branches: [ "staging" ]
    paths:
      - "frontend/**"
      - "backend/**"
      - "k8sdeployment/**"
  workflow_dispatch:   # allows manual trigger from GitHub UI

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER: eks-staging
  NAMESPACE: syntera-mvp
  ECR_FRONTEND_REPO: synth-frontend
  ECR_BACKEND_REPO: synth-backend

jobs:
  deploy:
    runs-on: [self-hosted, staging-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      
      - name: Build & Push Frontend
        id: build-frontend
        working-directory: frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG
          echo "frontend_image=$ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      
      - name: Build & Push Backend
        id: build-backend
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG
          echo "backend_image=$ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Deploy to EKS
        run: |
          set -e

          
          kubectl set image -f k8sdeployment/front-end-deployment.yml frontend=${{ steps.build-frontend.outputs.frontend_image }} -n $NAMESPACE
          kubectl apply -f k8sdeployment/front-end-service.yml -n $NAMESPACE
          kubectl apply -f k8sdeployment/front-ingress.yml -n $NAMESPACE
          if ! kubectl rollout status -f k8sdeployment/front-end-deployment.yml -n $NAMESPACE; then
            echo "Frontend rollout failed, rolling back..."
            kubectl rollout undo -f k8sdeployment/front-end-deployment.yml -n $NAMESPACE
          fi

          
          kubectl set image -f k8sdeployment/deployment.yml backend=${{ steps.build-backend.outputs.backend_image }} -n $NAMESPACE
          kubectl apply -f k8sdeployment/service.yml -n $NAMESPACE
          kubectl apply -f k8sdeployment/ingress.yml -n $NAMESPACE
          if ! kubectl rollout status -f k8sdeployment/deployment.yml -n $NAMESPACE; then
            echo "Backend rollout failed, rolling back..."
            kubectl rollout undo -f k8sdeployment/deployment.yml -n $NAMESPACE
          fi


